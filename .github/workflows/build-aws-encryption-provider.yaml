name: Build AWS Kubernetes encryption provider Docker image
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      # https://github.com/kubernetes-sigs/aws-encryption-provider.git
      - name: Checkout external source
        uses: actions/checkout@v7
        with:
          repository: 'kubernetes-sigs/aws-encryption-provider'
          ref: master

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sydneyresearchtech/aws-encryption-provider:latest
